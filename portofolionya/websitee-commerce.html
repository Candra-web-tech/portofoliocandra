<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Commerce Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:#2563eb;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:1200px;
    margin:20px auto;
}

.section{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #ddd;
    border-radius:5px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
}

.btn-primary{
    background:#2563eb;
}

.btn-danger{
    background:#dc2626;
}

.btn-success{
    background:#16a34a;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-body{
    padding:15px;
}

.price{
    color:#16a34a;
    font-weight:bold;
    margin:10px 0;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #ddd;
}

.total{
    font-size:20px;
    font-weight:bold;
    margin-top:15px;
}

.admin-form{
    display:grid;
    grid-template-columns:1fr 1fr 1fr auto;
    gap:10px;
}

@media(max-width:768px){
    .admin-form{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<header>
    <h1>🛒 E-Commerce Store</h1>
    <p>E-commerce website sederhana</p>
</header>

<div class="container">

    <!-- SEARCH -->
    <div class="section">
        <h2>Cari Produk</h2>
        <input
            type="text"
            id="search"
            placeholder="Cari produk..."
            onkeyup="searchProduct()">
    </div>

    <!-- ADMIN -->
    <div class="section">
        <h2>Manajemen Produk</h2>

        <div class="admin-form">

            <input
                type="text"
                id="productName"
                placeholder="Nama Produk">

            <input
                type="number"
                id="productPrice"
                placeholder="Harga">

            <input
                type="text"
                id="productImage"
                placeholder="URL Gambar">

            <button
                class="btn-success"
                onclick="addProduct()">
                Tambah
            </button>

        </div>
    </div>

    <!-- PRODUK -->
    <div class="section">
        <h2>Daftar Produk</h2>
        <div id="productList" class="grid"></div>
    </div>

    <!-- CART -->
    <div class="section">
        <h2>Keranjang Belanja</h2>

        <div id="cartItems"></div>

        <div class="total">
            Total:
            Rp <span id="totalPrice">0</span>
        </div>

        <br>

        <button
            class="btn-primary"
            onclick="checkout()">
            Checkout
        </button>
    </div>

</div>

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

function saveProducts(){
localStorage.setItem(
"products",
JSON.stringify(products)
);
}

function saveCart(){
localStorage.setItem(
"cart",
JSON.stringify(cart)
);
}

function renderProducts(data = products){

const list =
document.getElementById("productList");

list.innerHTML="";

data.forEach(product=>{

list.innerHTML += `
<div class="card">

<img src="${product.image}">

<div class="card-body">

<h3>${product.name}</h3>

<div class="price">
Rp ${product.price.toLocaleString()}
</div>

<button
class="btn-primary"
onclick="addToCart(${product.id})">
Tambah ke Keranjang
</button>

<button
class="btn-danger"
onclick="deleteProduct(${product.id})">
Hapus
</button>

</div>

</div>
`;
});
}

function addProduct(){

const name =
document.getElementById("productName").value;

const price =
document.getElementById("productPrice").value;

const image =
document.getElementById("productImage").value;

if(!name || !price || !image){
alert("Lengkapi data produk!");
return;
}

products.push({
id:Date.now(),
name,
price:Number(price),
image
});

saveProducts();
renderProducts();

document.getElementById("productName").value="";
document.getElementById("productPrice").value="";
document.getElementById("productImage").value="";
}

function deleteProduct(id){

if(confirm("Hapus produk ini?")){

products =
products.filter(
p=>p.id !== id
);

saveProducts();
renderProducts();
}
}

function addToCart(id){

const product =
products.find(
p=>p.id===id
);

cart.push(product);

saveCart();
renderCart();
}

function renderCart(){

const cartBox =
document.getElementById("cartItems");

cartBox.innerHTML="";

let total=0;

cart.forEach((item,index)=>{

total += item.price;

cartBox.innerHTML += `
<div class="cart-item">

<div>
${item.name}
</div>

<div>

Rp ${item.price.toLocaleString()}

<button
class="btn-danger"
onclick="removeCart(${index})">
X
</button>

</div>

</div>
`;
});

document.getElementById("totalPrice")
.textContent =
total.toLocaleString();
}

function removeCart(index){

cart.splice(index,1);

saveCart();
renderCart();
}

function checkout(){

if(cart.length===0){

alert("Keranjang masih kosong!");
return;
}

let total =
cart.reduce(
(sum,item)=>
sum+item.price,
0
);

alert(
"Checkout Berhasil!\n\nTotal Pembayaran:\nRp "
+
total.toLocaleString()
);

cart=[];

saveCart();

renderCart();
}

function searchProduct(){

let keyword =
document
.getElementById("search")
.value
.toLowerCase();

let filtered =
products.filter(product=>

product.name
.toLowerCase()
.includes(keyword)

);

renderProducts(filtered);
}

renderProducts();
renderCart();

</script>

</body>
</html>
